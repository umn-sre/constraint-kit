id: token-budget
name: Token Budget
description: >
  Manages context/token consumption within an agent session: prefers
  targeted reads over full-file dumps, avoids redundant re-reads,
  chunks large tasks explicitly, and flags early when a task is
  likely to outgrow one session's practical context budget.
