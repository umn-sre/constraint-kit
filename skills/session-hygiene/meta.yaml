id: session-hygiene
name: Session Hygiene
description: >
  Runtime discipline for implementation sessions. Maintains a session
  ledger, detects and surfaces loops before they consume context, tracks
  token budget against surface thresholds, verifies file changes were
  actually applied, and executes a seven-step wrap-up protocol that closes
  every session in a known, resumable state.
