id: source-constrained-synthesis
name: Source-Constrained Synthesis
description: >
  Constrains AI synthesis to only provided notes and sources.
  Enforces epistemic closure: the AI produces an explicit inventory
  of confirmed facts and available sources, flags every gap, and
  asks before writing. Never fills unknowns from training knowledge.
  Use for research papers, policy briefs, and any output where
  citation traceability is required.
schema_version: "0.1.0"
