id: session-archaeology
name: Session Archaeology
description: >
  Extracts a structured, confidence-tagged spec (ARCHAEOLOGY_NOTES.md) from
  an existing repository with no reliable documented design — vibe-coded,
  legacy, or unknown-provenance code. Runs discovery passes over the actual
  repo, not intake alone, to produce a structural inventory, behavior
  contract, feature inventory, and flaw taxonomy with root-cause tags, then
  hands off to session-preflight to scope the greenfield replacement.
schema_version: "0.1.0"
modes:
  - collaborating
  - generating-structured
personas:
  - engineer
tags:
  - planning
  - spec-discovery
  - session-management
  - workslop-prevention
  - anti-workslop
pairs_with:
  - session-preflight
  - vibe-coding-discipline
  - systematic-debugging
version: "0.1.0"
author: constraint-kit
