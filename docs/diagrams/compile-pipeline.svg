<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>constraint-kit compile pipeline</title>
<desc>Data flow from agent.yaml through skill resolution and Jinja2 rendering to the final output file, with validate.py as a schema gate on the skill/role/bundle library.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; }
  .box-title { fill: #2C2C2A; }
  .box-sub { fill: #444441; }
  .arr { stroke: #5F5E5A; stroke-width: 0.5; }
  .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 3 3; }
</style>

<!-- 1. agent.yaml -->
<rect class="box" x="180" y="40" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th box-title" x="340" y="58" text-anchor="middle" dominant-baseline="central">agent.yaml</text>
<text class="ts box-sub" x="340" y="76" text-anchor="middle" dominant-baseline="central">Role, task, mode, target</text>
<line x1="340" y1="96" x2="340" y2="136" class="arr" marker-end="url(#arrow)"/>

<!-- 2. extends: resolution -->
<rect class="box" x="180" y="136" width="320" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th box-title" x="340" y="154" text-anchor="middle" dominant-baseline="central">extends: resolution</text>
<text class="ts box-sub" x="340" y="172" text-anchor="middle" dominant-baseline="central">Merges in a base config</text>
<line x1="340" y1="192" x2="340" y2="232" class="arr" marker-end="url(#arrow)"/>

<!-- 3. Resolve skills & bundles -->
<rect class="box" x="180" y="232" width="320" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th box-title" x="340" y="250" text-anchor="middle" dominant-baseline="central">Resolve skills &amp; bundles</text>
<text class="ts box-sub" x="340" y="268" text-anchor="middle" dominant-baseline="central">Role baseline + task skills</text>
<line x1="340" y1="288" x2="340" y2="328" class="arr" marker-end="url(#arrow)"/>

<!-- 4. Jinja2 template render -->
<rect class="box" x="180" y="328" width="320" height="56" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
<text class="th box-title" x="340" y="346" text-anchor="middle" dominant-baseline="central">Jinja2 template render</text>
<text class="ts box-sub" x="340" y="364" text-anchor="middle" dominant-baseline="central">renderers/*.j2 by target</text>
<line x1="340" y1="384" x2="340" y2="424" class="arr" marker-end="url(#arrow)"/>

<!-- 5. Rendered output -->
<rect class="box" x="180" y="424" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th box-title" x="340" y="442" text-anchor="middle" dominant-baseline="central">Rendered output</text>
<text class="ts box-sub" x="340" y="460" text-anchor="middle" dominant-baseline="central">Session starter or config file</text>

<!-- Side: validate.py gate -->
<line x1="500" y1="260" x2="558" y2="260" class="leader"/>
<rect x="558" y="232" width="112" height="56" rx="8" stroke-width="0.5" fill="#FAEEDA" stroke="#854F0B"/>
<text class="th" x="614" y="250" text-anchor="middle" dominant-baseline="central" fill="#412402">validate.py</text>
<text class="ts" x="614" y="268" text-anchor="middle" dominant-baseline="central" fill="#633806">Schema gate</text>
</svg>
