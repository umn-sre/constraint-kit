<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text font-size="12" fill="#5F5E5A" x="180" y="30" text-anchor="middle">Unconstrained</text>
  <text font-size="12" fill="#5F5E5A" x="500" y="30" text-anchor="middle">Constraint-kit loaded</text>
  <line x1="340" y1="14" x2="340" y2="560" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>

  <!-- Session 1 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="68">Session 1 — greenfield</text>
  <line x1="44" y1="74" x2="636" y2="74" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="56" y="82" width="248" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#791F1F" x="180" y="100" text-anchor="middle" dominant-baseline="central">Workslop output</text>
  <text font-size="12" fill="#A32D2D" x="180" y="118" text-anchor="middle" dominant-baseline="central">Hallucinated API · bad dep · style violations</text>
  <rect x="376" y="82" width="248" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="500" y="100" text-anchor="middle" dominant-baseline="central">Constrained output</text>
  <text font-size="12" fill="#0F6E56" x="500" y="118" text-anchor="middle" dominant-baseline="central">Flags unknown API · asks before adding dep</text>

  <!-- Session 2 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="184">Session 2 — brownfield</text>
  <line x1="44" y1="190" x2="636" y2="190" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="56" y="198" width="248" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#791F1F" x="180" y="216" text-anchor="middle" dominant-baseline="central">Workslop output</text>
  <text font-size="12" fill="#A32D2D" x="180" y="234" text-anchor="middle" dominant-baseline="central">Ignores patterns · new style in old module</text>
  <rect x="376" y="198" width="248" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="500" y="216" text-anchor="middle" dominant-baseline="central">Constrained output</text>
  <text font-size="12" fill="#0F6E56" x="500" y="234" text-anchor="middle" dominant-baseline="central">Reads existing patterns · matches them exactly</text>

  <!-- Session 3 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="300">Session 3 — debugging</text>
  <line x1="44" y1="306" x2="636" y2="306" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="56" y="314" width="248" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#791F1F" x="180" y="332" text-anchor="middle" dominant-baseline="central">Workslop output</text>
  <text font-size="12" fill="#A32D2D" x="180" y="350" text-anchor="middle" dominant-baseline="central">Fixes symptom · untestable · no verification</text>
  <rect x="376" y="314" width="248" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="500" y="332" text-anchor="middle" dominant-baseline="central">Constrained output</text>
  <text font-size="12" fill="#0F6E56" x="500" y="350" text-anchor="middle" dominant-baseline="central">Diagnoses cause · proposes testable fix</text>

  <!-- Outcome row -->
  <line x1="44" y1="414" x2="636" y2="414" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="180" y1="370" x2="180" y2="430" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="56" y="430" width="248" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#444441" x="180" y="446" text-anchor="middle" dominant-baseline="central">Technical debt</text>
  <text font-size="12" fill="#5F5E5A" x="180" y="463" text-anchor="middle" dominant-baseline="central">Discovered in review or production</text>
  <line x1="500" y1="370" x2="500" y2="430" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="376" y="430" width="248" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="500" y="446" text-anchor="middle" dominant-baseline="central">Compliant code</text>
  <text font-size="12" fill="#0F6E56" x="500" y="463" text-anchor="middle" dominant-baseline="central">Passes lint, review, and test gates</text>

  <!-- Footer -->
  <line x1="44" y1="490" x2="636" y2="490" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-size="12" fill="#888780" x="180" y="516" text-anchor="middle">Same prompt — no constraints loaded</text>
  <text font-size="12" fill="#888780" x="500" y="516" text-anchor="middle">Same prompt — agent.yaml loaded first</text>
  <text font-size="12" fill="#888780" x="180" y="534" text-anchor="middle">AI fills gaps from training data</text>
  <text font-size="12" fill="#888780" x="500" y="534" text-anchor="middle">AI asks before assuming</text>
</svg>
