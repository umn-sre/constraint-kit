<svg width="680" height="578" viewBox="0 0 680 578" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Phase 1 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="58">Phase 1 — intake</text>
  <rect x="44" y="66" width="174" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="131" y="88" text-anchor="middle" dominant-baseline="central">Ticket + error messages</text>
  <line x1="218" y1="88" x2="250" y2="88" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="252" y="66" width="176" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="340" y="88" text-anchor="middle" dominant-baseline="central">DNS + CA audit logs</text>
  <line x1="428" y1="88" x2="460" y2="88" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="462" y="66" width="174" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="549" y="80" text-anchor="middle" dominant-baseline="central">Epistemic inventory</text>
  <text font-size="12" fill="#0F6E56" x="549" y="97" text-anchor="middle" dominant-baseline="central">Confirmed facts, gaps flagged</text>

  <!-- Phase 1→2 -->
  <line x1="44" y1="124" x2="636" y2="124" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="340" y1="110" x2="340" y2="146" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="144">Phase 2 — causal analysis + gap resolution</text>
  <rect x="148" y="152" width="224" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="260" y="168" text-anchor="middle" dominant-baseline="central">Causal chain</text>
  <text font-size="12" fill="#0F6E56" x="260" y="185" text-anchor="middle" dominant-baseline="central">SERVFAIL → blocked issuance</text>
  <line x1="372" y1="174" x2="400" y2="174" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="402" y="152" width="176" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806" x="490" y="168" text-anchor="middle" dominant-baseline="central">Gap resolution</text>
  <text font-size="12" fill="#854F0B" x="490" y="185" text-anchor="middle" dominant-baseline="central">AI asks, user fills</text>
  <path d="M 490 196 Q 490 238 260 238 Q 148 238 148 196" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-dash)"/>
  <text font-size="12" fill="#888780" x="322" y="254" text-anchor="middle">repeat until causal chain is complete</text>

  <!-- Phase 2→3 -->
  <line x1="44" y1="270" x2="636" y2="270" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="260" y1="196" x2="260" y2="292" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="290">Phase 3 — incident report (two audience tiers)</text>
  <path d="M 260 292 L 260 306 L 175 306 L 175 316" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 260 292 L 260 306 L 478 306 L 478 316" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="64" y="316" width="222" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#712B13" x="175" y="332" text-anchor="middle" dominant-baseline="central">Executive summary</text>
  <text font-size="12" fill="#993C1D" x="175" y="349" text-anchor="middle" dominant-baseline="central">Impact, cause, actions</text>
  <rect x="346" y="316" width="264" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#3C3489" x="478" y="332" text-anchor="middle" dominant-baseline="central">Technical detail</text>
  <text font-size="12" fill="#534AB7" x="478" y="349" text-anchor="middle" dominant-baseline="central">DNS trace, RFC refs, fix options</text>

  <!-- Phase 3→4 -->
  <line x1="44" y1="378" x2="636" y2="378" stroke="#D3D1C7" stroke-width="0.5"/>
  <path d="M 175 360 L 175 410 L 326 410" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <path d="M 478 360 L 478 410 L 326 410" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <line x1="326" y1="410" x2="326" y2="420" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <text font-size="12" fill="#5F5E5A" x="44" y="418">Phase 4 — on-call playbook</text>
  <rect x="190" y="426" width="272" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041" x="326" y="442" text-anchor="middle" dominant-baseline="central">On-call playbook</text>
  <text font-size="12" fill="#0F6E56" x="326" y="459" text-anchor="middle" dominant-baseline="central">Detect · diagnose · escalate · resolve</text>

  <!-- Output -->
  <line x1="44" y1="484" x2="636" y2="484" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="326" y1="470" x2="326" y2="506" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A" x="326" y="526" text-anchor="middle">Google Doc · .docx · Markdown</text>
  <text font-size="12" fill="#5F5E5A" x="326" y="544" text-anchor="middle">Exec summary separate from technical detail</text>
</svg>
