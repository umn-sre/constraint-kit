<svg width="700" height="620" viewBox="0 0 700 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>session-preflight walkthrough: raw notes to implementation</title>
<desc>Flow from raw user notes through mode detection, intake questions, produced planning artifacts, a paste-ready implementation session, and session close.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; }
  .box-title { fill: #2C2C2A; }
  .box-sub { fill: #444441; }
  .arr { stroke: #5F5E5A; stroke-width: 0.5; }
</style>

<rect class="box" x="190" y="30" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th box-title" x="350" y="48" text-anchor="middle" dominant-baseline="central">Raw notes</text>
<text class="ts box-sub" x="350" y="66" text-anchor="middle" dominant-baseline="central">Scraper gave a false "all green" reading</text>
<line x1="350" y1="86" x2="350" y2="126" class="arr" marker-end="url(#arrow)"/>

<rect class="box" x="190" y="126" width="320" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th box-title" x="350" y="144" text-anchor="middle" dominant-baseline="central">Mode detection: GREENFIELD</text>
<text class="ts box-sub" x="350" y="162" text-anchor="middle" dominant-baseline="central">No agent-base.yaml exists yet</text>
<line x1="350" y1="182" x2="350" y2="222" class="arr" marker-end="url(#arrow)"/>

<rect class="box" x="190" y="222" width="320" height="56" rx="8" stroke-width="0.5" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="th box-title" x="350" y="240" text-anchor="middle" dominant-baseline="central">Intake questions</text>
<text class="ts box-sub" x="350" y="258" text-anchor="middle" dominant-baseline="central">Surface, environment, gates, done condition</text>
<line x1="350" y1="278" x2="350" y2="318" class="arr" marker-end="url(#arrow)"/>

<rect class="box" x="190" y="318" width="320" height="56" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
<text class="th box-title" x="350" y="336" text-anchor="middle" dominant-baseline="central">agent-base.yaml + SESSION_PLAN.md</text>
<text class="ts box-sub" x="350" y="354" text-anchor="middle" dominant-baseline="central">Both produced before any code</text>
<line x1="350" y1="374" x2="350" y2="414" class="arr" marker-end="url(#arrow)"/>

<rect class="box" x="190" y="414" width="320" height="56" rx="8" stroke-width="0.5" fill="#FAEEDA" stroke="#854F0B"/>
<text class="th" x="350" y="432" text-anchor="middle" dominant-baseline="central" fill="#412402">S01 paste-ready session</text>
<text class="ts" x="350" y="450" text-anchor="middle" dominant-baseline="central" fill="#633806">agent-implementer.yaml → base scrapers</text>
<line x1="350" y1="470" x2="350" y2="510" class="arr" marker-end="url(#arrow)"/>

<rect class="box" x="190" y="510" width="320" height="56" rx="8" stroke-width="0.5"/>
<text class="th box-title" x="350" y="528" text-anchor="middle" dominant-baseline="central">Session close</text>
<text class="ts box-sub" x="350" y="546" text-anchor="middle" dominant-baseline="central">Status updated, session_history appended</text>
</svg>
