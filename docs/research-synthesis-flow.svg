<svg width="680" height="446" viewBox="0 0 680 446" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Phase 1 label -->
  <text font-size="12" fill="#5F5E5A" x="44" y="58">Phase 1 — intake</text>

  <!-- Box A: Notes + sources -->
  <rect x="44" y="68" width="190" height="44" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041"
        x="139" y="90" text-anchor="middle" dominant-baseline="central">Notes + sources</text>

  <!-- Arrow A→B -->
  <line x1="234" y1="90" x2="268" y2="90"
        stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box B: Epistemic inventory -->
  <rect x="270" y="68" width="230" height="44" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041"
        x="385" y="83" text-anchor="middle" dominant-baseline="central">Epistemic inventory</text>
  <text font-size="12" fill="#0F6E56"
        x="385" y="101" text-anchor="middle" dominant-baseline="central">Facts confirmed, gaps flagged</text>

  <!-- Phase divider 1→2 -->
  <line x1="44" y1="126" x2="636" y2="126" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="385" y1="112" x2="385" y2="146"
        stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2 label -->
  <text font-size="12" fill="#5F5E5A" x="44" y="146">Phase 2 — outline + gap resolution</text>

  <!-- Box C: Outline -->
  <rect x="220" y="155" width="210" height="44" rx="8"
        fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#085041"
        x="325" y="170" text-anchor="middle" dominant-baseline="central">Outline</text>
  <text font-size="12" fill="#0F6E56"
        x="325" y="188" text-anchor="middle" dominant-baseline="central">Sections mapped to sources</text>

  <!-- Arrow C→D -->
  <line x1="430" y1="177" x2="457" y2="177"
        stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Box D: Gap resolution -->
  <rect x="460" y="155" width="168" height="44" rx="8"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#633806"
        x="544" y="170" text-anchor="middle" dominant-baseline="central">Gap resolution</text>
  <text font-size="12" fill="#854F0B"
        x="544" y="188" text-anchor="middle" dominant-baseline="central">AI asks, user fills</text>

  <!-- Return arc: bottom of D → curves down → left of C -->
  <path d="M 544 199 Q 544 248 325 248 Q 220 248 220 199"
        fill="none" stroke="#888780" stroke-width="1"
        stroke-dasharray="4 3" marker-end="url(#arrow-dash)"/>
  <text font-size="12" fill="#888780"
        x="385" y="265" text-anchor="middle">repeat until no gaps remain</text>

  <!-- Phase divider 2→3 -->
  <line x1="44" y1="282" x2="636" y2="282" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="325" y1="199" x2="325" y2="300"
        stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 3 label -->
  <text font-size="12" fill="#5F5E5A" x="44" y="300">Phase 3 — generate</text>

  <!-- Box E: Paper written -->
  <rect x="210" y="308" width="230" height="44" rx="8"
        fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#712B13"
        x="325" y="323" text-anchor="middle" dominant-baseline="central">Paper written</text>
  <text font-size="12" fill="#993C1D"
        x="325" y="341" text-anchor="middle" dominant-baseline="central">Citations from sources only</text>

  <!-- Box F: Hard constraint callout -->
  <rect x="462" y="308" width="162" height="44" rx="8"
        fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" fill="#444441"
        x="543" y="323" text-anchor="middle" dominant-baseline="central">Hard constraint</text>
  <text font-size="12" fill="#5F5E5A"
        x="543" y="341" text-anchor="middle" dominant-baseline="central">No training-data fill-in</text>

  <!-- Arrow constraint→paper -->
  <line x1="462" y1="330" x2="442" y2="330"
        stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output arrow + label -->
  <line x1="325" y1="352" x2="325" y2="384"
        stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#5F5E5A"
        x="325" y="404" text-anchor="middle">Google Doc · .docx · Markdown</text>
</svg>
