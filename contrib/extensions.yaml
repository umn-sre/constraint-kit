# constraint-kit: Extension Registry
# ─────────────────────────────────────────────────────────────
# This file lists community extension repositories that provide
# domain-specific roles, skills, and bundles built on constraint-kit.
#
# Extensions are maintained by their authors — not by constraint-kit.
# Listing here means the repo follows the constraint-kit schema.
# It does not imply endorsement or quality review of content.
#
# To list your extension:
#   1. Ensure your repo contains a constraint-kit.yaml manifest
#   2. Ensure your skills/roles follow the schema in schema/
#   3. Submit a PR adding an entry to this file
#   See docs/HOW_TO_CONTRIBUTE.md for full instructions.
# ─────────────────────────────────────────────────────────────

schema_version: "0.1.0"

extensions:
