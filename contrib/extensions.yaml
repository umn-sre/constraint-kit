  # ── Known external sources ────────────────────────────────
  # These are not constraint-kit extensions (they don't follow the schema)
  # but are notable skill libraries worth knowing about.
  # Listed here for discoverability and attribution transparency.

  - id: obra-superpowers
    name: Superpowers (obra)
    repo: https://github.com/obra/superpowers
    manifest: null
    description: >
      Agentic skills framework for Claude Code. The original inspiration
      for constraint-kit's skills-as-files pattern. Two constraint-kit
      skills (test-driven-development, systematic-debugging) are adapted
      from this library with full provenance tracked in their meta.yaml.
      If you use Claude Code specifically, superpowers is worth evaluating
      as a complement or alternative.
    personas: [engineer]
    tags: [engineering, tdd, debugging, claude-code]
    author: obra
    added: "2026-03-14"
    verified: false
    note: >
      Not a constraint-kit extension — does not follow the constraint-kit
      schema. Listed for attribution and discoverability only.
