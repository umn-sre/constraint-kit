- id: source-constrained-synthesis
  name: Source-Constrained Synthesis
  file: skills/source-constrained-synthesis/SKILL.md
  meta: skills/source-constrained-synthesis/meta.yaml
  modes:
  - collaborating
  - generating-doc
  personas:
  - researcher
  - writer
  tags:
  - research
  - synthesis
  - epistemic
  - citations
  - constrained
  pairs_with:
  - research-brief
  - document-structure
  - plain-language
  - argument-construction
  provenance: null
  description: 'Constrains AI synthesis to only provided notes and sources. Enforces
    epistemic closure: the AI produces an explicit inventory of confirmed
    facts and available sources, flags every gap, and asks before writing.
    Never fills unknowns from training knowledge. Use for research papers,
    policy briefs, and any output where citation traceability is required.

    '
  version: 0.1.0
- id: incident-causal-synthesis
  name: Incident Causal Synthesis
  file: skills/incident-causal-synthesis/SKILL.md
  meta: skills/incident-causal-synthesis/meta.yaml
  modes:
  - collaborating
  - generating-doc
  personas:
  - engineer
  - researcher
  tags:
  - incident
  - post-mortem
  - root-cause
  - synthesis
  - constrained
  pairs_with:
  - systematic-debugging
  - document-structure
  - plain-language
  - decision-records
  provenance: null
  description: 'Constrains post-mortem synthesis to provided incident evidence. The
    AI constructs the causal chain only from the supplied timeline, logs,
    and observations — never from general IT knowledge. Flags every
    unsupported causal link before writing. Derives the on-call playbook
    strictly from confirmed report findings. Use for incident reports,
    post-mortems, and derived on-call playbooks.

    '
  version: 0.1.0
- id: vibe-coding-discipline
  name: Vibe-Coding Discipline
  file: skills/vibe-coding-discipline/SKILL.md
  meta: skills/vibe-coding-discipline/meta.yaml
  modes:
  - generating-code
  - collaborating
  personas:
  - engineer
  tags:
  - engineering
  - code-quality
  - patterns
  - compliance
  - anti-workslop
  pairs_with:
  - python-compliance
  - systematic-debugging
  - test-driven-development
  provenance: null
  description: 'Prevents workslop: code that looks correct but violates project
    standards, ignores established patterns, or cannot be verified. Requires
    the AI to read existing modules before writing new ones, state the test
    before writing the function, confirm API shapes before using them, and
    get explicit approval before adding any dependency. Covers greenfield,
    brownfield, and debugging sessions.

    '
  version: 0.1.0
