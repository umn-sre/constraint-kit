# .constraint-kit/agent-supervisor.yaml
# ─────────────────────────────────────────────────────────────
# Supervisor config — Claude browser surface.
# Inherits shared context from agent-base.yaml.
#
# Render (run immediately before opening session):
#   python ~/constraint-kit/bootstrap/render.py \
#     .constraint-kit/agent-supervisor.yaml
#
# IMPORTANT: Re-render immediately before each session open.
# After rendering, verify injected skill blocks match expected
# schema_version and skill name headers before proceeding.
# If content looks stale, re-render before continuing.
#
# The supervisor role:
#   - Reviews Copilot-generated doc content before it is committed
#   - Catches structural deviations from SKILL.md conventions
#   - Maintains cross-session architectural continuity
#   - Generates recovery specifications if a doc file is malformed
#   - Does NOT write documentation content directly
# ─────────────────────────────────────────────────────────────
extends: agent-base.yaml
schema_version: "0.1.0"
project: ck-docs
role: engineer
mode: collaborating
target: session-prompt
surface: claude-browser

task_skills:
  - session-preflight
  - session-hygiene
  - session-bootstrap

task: >
  S02 supervisor — constraint-kit documentation rewrite. GitHub Copilot
  is the implementer writing docs/01-what-is-constraint-kit.md (Sections
  1-2) and docs/02-skills.md (Section 3). This surface reviews each file
  before it is committed.

  Skills are injected by render.py from ~/ck-personal/skills/. Before
  beginning any review work, verify the rendered session starter contains
  session-preflight, session-hygiene, and session-bootstrap skill blocks,
  each showing schema_version: "0.1.0". If any are missing or stale,
  stop and re-render before proceeding.

  When reviewing Copilot output, check against:
  1. Audience fit — written for SRE/DevOps peers who know context
     engineering but not constraint-kit; no assumed familiarity with
     internal tooling
  2. Structural completeness — each file answers every question listed
     in .constraint-kit/INTAKE_NOTES.md for its assigned sections;
     no questions left implicit
  3. Accuracy — claims about skill schema, agent yaml fields, render.py
     behavior, and session lifecycle match actual artifact content in
     this repo; flag any drift
  4. Update contract — sections that would be invalidated by a schema
     change state that dependency explicitly
  5. No scope creep — Copilot has not drifted into Sections 4-10 content

  Do not write documentation content directly. If a correction is
  needed, produce a recovery specification for Copilot to implement.
