schema_version: "0.1.0"
project: ck-docs
role: engineer
extension: ../ck-personal/constraint-kit.yaml

environment:
  repo: ~/constraint-kit
  personal_skills: ~/ck-personal/skills
  tools:
    validate: ~/constraint-kit/bootstrap/validate.py
    render: ~/constraint-kit/bootstrap/render.py
  surfaces:
    supervisor: claude-browser
    implementer: github-copilot

conventions:
  artifact_dir: .constraint-kit/
  session_plan: SESSION_PLAN.md
  intake_notes: .constraint-kit/INTAKE_NOTES.md
  pattern: A

session_plan:
  update_instructions: >
    After each session: update SESSION_PLAN.md (Status, Actual effort,
    Lessons), set Status ready for any newly unblocked sessions, and
    append a session_history entry below.

session_history:
  - session_id: S01
    date: "2026-07-03"
    surface: claude-browser
    tasks_completed: 13
    tasks_carried_forward: 0
    budget_consumed_estimate: 1 session
    summary: >
      Produced all six scaffolding artifacts: meta.yaml, agent-base.yaml,
      agent-supervisor.yaml, agent-implementer.yaml, SESSION_PLAN.md,
      INTAKE_NOTES.md. Initial intake confusion resolved via QC Drill
      gap-resolution conversation before artifact generation. Two lessons
      encoded: validate.py --file only dispatches on skills/, roles/,
      bundles/ path parts — .constraint-kit/ files are out of scope and
      checklist items updated accordingly; artifact filenames use hyphens
      throughout (agent-base.yaml not agent_base.yaml), consistent with
      session-preflight-skill precedent. Tools live in
      ~/constraint-kit/bootstrap/, not tools/ — corrected post-commit.
      Skill injection requires: (1) extension: field at top level pointing
      to ck-personal/constraint-kit.yaml, (2) task_skills: field (not
      skills:) listing skill IDs. path: entries and skills: are both
      silently ignored by render.py. Tools live in
      ~/constraint-kit/bootstrap/, not tools/ — corrected post-commit.
