id: vibe-coding-discipline
name: Vibe-Coding Discipline
description: >
  Prevents workslop: code that looks correct but violates project
  standards, ignores established patterns, or cannot be verified.
  Requires the AI to read existing modules before writing new ones,
  state the test before writing the function, confirm API shapes
  before using them, and get explicit approval before adding any
  dependency. Covers greenfield, brownfield, and debugging sessions.
schema_version: "0.1.0"
